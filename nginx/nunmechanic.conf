server {
    listen 80;
    server_name nunmechanic.com www.nunmechanic.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nunmechanic.com www.nunmechanic.com;

    ssl_certificate     /etc/ssl/nunmechanic/origin.pem;
    ssl_certificate_key /etc/ssl/nunmechanic/origin-key.pem;

    # Cloudflare recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to Next.js frontend — HTML pages must NOT be cached
    location / {
        proxy_pass http://localhost:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Prevent caching HTML pages — ensures fresh chunk references after deploy
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets — immutable, cache forever (hash in filename changes on rebuild)
    location /_next/static/ {
        proxy_pass http://localhost:9090;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js data routes — no cache (server-fetched data)
    location /_next/data/ {
        proxy_pass http://localhost:9090;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # PWA service worker - no cache
    location /sw.js {
        proxy_pass http://localhost:9090;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
