name: Deploy NunStock to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            echo "======================================"
            echo "  NunStock Auto Deploy"
            echo "======================================"

            # ── 1. Node.js 22 ──────────────────────
            if ! command -v node &>/dev/null; then
              echo ">>> ติดตั้ง Node.js 22..."
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt install -y nodejs
            else
              echo ">>> Node.js $(node -v) พร้อมแล้ว"
            fi

            # ── 2. PM2 ─────────────────────────────
            if ! command -v pm2 &>/dev/null; then
              echo ">>> ติดตั้ง PM2..."
              sudo npm install -g pm2
              pm2 startup systemd -u $USER --hp $HOME | tail -1 | bash || true
            else
              echo ">>> PM2 $(pm2 -v) พร้อมแล้ว"
            fi

            # ── 3. PostgreSQL ───────────────────────
            if ! command -v psql &>/dev/null; then
              echo ">>> ติดตั้ง PostgreSQL..."
              sudo apt install -y postgresql postgresql-contrib
              sudo systemctl enable postgresql
              sudo systemctl start postgresql
            else
              echo ">>> PostgreSQL พร้อมแล้ว"
            fi

            # ── 4. สร้าง DB user (ถ้าไม่มี) ────────
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='nunstock'" \
              | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER nunstock WITH PASSWORD '$(echo "${{ secrets.DATABASE_URL }}" | grep -oP "(?<=:)[^@]+(?=@)")'"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='nunstock'" \
              | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE nunstock OWNER nunstock"

            # ── 5. Clone หรือ Pull ──────────────────
            if [ ! -d "/var/www/nunstock/.git" ]; then
              echo ">>> Clone โปรเจกต์..."
              sudo mkdir -p /var/www/nunstock
              sudo chown $USER:$USER /var/www/nunstock
              git clone https://github.com/${{ github.repository }} /var/www/nunstock
            else
              echo ">>> Pull โค้ดล่าสุด..."
              cd /var/www/nunstock
              git fetch origin
              git reset --hard origin/main
            fi

            # ── 6. สร้าง .env ───────────────────────
            echo ">>> สร้าง .env files..."
            cat > /var/www/nunstock/backend/.env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PORT=1100
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            cat > /var/www/nunstock/frontend/.env.local << 'ENVEOF'
            NEXT_PUBLIC_API_URL=http://localhost:1100
            ENVEOF

            # ── 7. Deploy Backend ───────────────────
            echo ">>> Deploy Backend (port 1100)..."
            cd /var/www/nunstock/backend
            npm ci
            npx prisma generate
            npx prisma db push --accept-data-loss
            npx prisma db seed 2>/dev/null || true
            npx tsx src/seed-admin.ts
            rm -rf dist
            npx tsc
            pm2 reload nunstock-backend --update-env 2>/dev/null \
              || pm2 start dist/index.js --name nunstock-backend

            # ── 8. Deploy Frontend ──────────────────
            echo ">>> Deploy Frontend (port 9090)..."
            cd /var/www/nunstock/frontend
            rm -rf .next
            npm ci
            npm run build
            pm2 reload nunstock-frontend --update-env 2>/dev/null \
              || PORT=9090 pm2 start npm --name nunstock-frontend -- start

            pm2 save
            echo "======================================"
            echo "  Deploy เสร็จสมบูรณ์! ✅"
            echo "  http://${{ secrets.VPS_HOST }}:9090"
            echo "======================================"
