name: Deploy NunStock to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          envs: DB_PASSWORD,DATABASE_URL,JWT_SECRET,CF_ORIGIN_CERT,CF_ORIGIN_KEY,LINE_CHANNEL_ACCESS_TOKEN,LINE_CHANNEL_SECRET
          script: |
            set -e
            echo "======================================"
            echo "  NunStock Auto Deploy"
            echo "======================================"

            # ── 1. Node.js 22 ──────────────────────
            export NODE_VERSION=$(node -v 2>/dev/null || echo "none")
            if [ "$NODE_VERSION" = "none" ]; then
              echo ">>> Installing Node.js 22..."
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt install -y nodejs
            else
              echo ">>> Node.js $NODE_VERSION ready"
            fi

            # ── 2. PM2 ─────────────────────────────
            if ! command -v pm2 &>/dev/null; then
              echo ">>> Installing PM2..."
              sudo npm install -g pm2
              pm2 startup systemd -u $USER --hp $HOME | tail -1 | bash || true
            else
              echo ">>> PM2 $(pm2 -v) ready"
            fi

            # ── 3. PostgreSQL ───────────────────────
            if ! command -v psql &>/dev/null; then
              echo ">>> Installing PostgreSQL..."
              sudo apt install -y postgresql postgresql-contrib
              sudo systemctl enable postgresql
              sudo systemctl start postgresql
            else
              echo ">>> PostgreSQL ready"
            fi

            # ── 4. Nginx ────────────────────────────
            if ! command -v nginx &>/dev/null; then
              echo ">>> Installing Nginx..."
              sudo apt install -y nginx
              sudo systemctl enable nginx
            else
              echo ">>> Nginx ready"
            fi

            # ── 5. Setup DB (safe idempotent) ──────
            echo ">>> Setting up database..."
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='nunstock'" \
              | grep -q 1 \
              && sudo -u postgres psql -c "ALTER USER nunstock WITH PASSWORD '$DB_PASSWORD'" \
              || sudo -u postgres psql -c "CREATE USER nunstock WITH PASSWORD '$DB_PASSWORD'"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='nunstock'" \
              | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE nunstock OWNER nunstock"
            echo ">>> Database ready"

            # ── 6. Clone or Pull ────────────────────
            if [ ! -d "/var/www/nunstock/.git" ]; then
              echo ">>> Cloning project..."
              sudo mkdir -p /var/www/nunstock
              sudo chown $USER:$USER /var/www/nunstock
              git clone https://github.com/${{ github.repository }} /var/www/nunstock
            else
              echo ">>> Pulling latest code..."
              cd /var/www/nunstock
              git fetch origin
              git reset --hard origin/main
            fi

            # ── 7. Create .env files ────────────────
            echo ">>> Creating .env files..."
            cat > /var/www/nunstock/backend/.env << EOF
            DATABASE_URL=$DATABASE_URL
            PORT=1100
            NODE_ENV=production
            JWT_SECRET=$JWT_SECRET
            LINE_CHANNEL_ACCESS_TOKEN=$LINE_CHANNEL_ACCESS_TOKEN
            LINE_CHANNEL_SECRET=$LINE_CHANNEL_SECRET
            CORS_ORIGINS=https://nunmechanic.com,https://api.nunmechanic.com
            EOF
            sed -i 's/^[[:space:]]*//' /var/www/nunstock/backend/.env

            APP_VER="1.0.$(git rev-list --count HEAD)"
            cat > /var/www/nunstock/frontend/.env.local << ENVEOF
            NEXT_PUBLIC_API_URL=http://localhost:1100
            NEXT_PUBLIC_APP_VERSION=$APP_VER
            ENVEOF
            sed -i 's/^[[:space:]]*//' /var/www/nunstock/frontend/.env.local

            # ── 8. SSL Certificates (Cloudflare Origin) ──
            echo ">>> Setting up SSL certificates..."
            sudo mkdir -p /etc/ssl/nunmechanic
            echo "$CF_ORIGIN_CERT" | sudo tee /etc/ssl/nunmechanic/origin.pem > /dev/null
            echo "$CF_ORIGIN_KEY" | sudo tee /etc/ssl/nunmechanic/origin-key.pem > /dev/null
            sudo chmod 600 /etc/ssl/nunmechanic/origin-key.pem
            sudo chmod 644 /etc/ssl/nunmechanic/origin.pem

            # ── 9. Nginx Config ─────────────────────
            echo ">>> Configuring Nginx..."
            sudo cp /var/www/nunstock/nginx/nunmechanic.conf /etc/nginx/sites-available/nunmechanic
            sudo cp /var/www/nunstock/nginx/api.nunmechanic.conf /etc/nginx/sites-available/api.nunmechanic
            sudo ln -sf /etc/nginx/sites-available/nunmechanic /etc/nginx/sites-enabled/
            sudo ln -sf /etc/nginx/sites-available/api.nunmechanic /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            # ── 10. Deploy Backend ───────────────────
            echo ">>> Deploy Backend (port 1100)..."
            cd /var/www/nunstock/backend
            npm install --prefer-offline
            npx prisma generate

            # Run migrations — baseline if DB was created via db push (no migration history)
            echo ">>> Checking migration state..."
            MIGRATED=$(sudo -u postgres psql -U postgres -d nunstock -tc \
              "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='_prisma_migrations')" \
              2>/dev/null | tr -d '[:space:]')

            if [ "$MIGRATED" = "f" ]; then
              echo ">>> Baseline: marking existing migrations as applied (first-time migrate)..."
              npx prisma migrate resolve --applied "20260220154116_init"
              npx prisma migrate resolve --applied "20260220160655_add_users"
              npx prisma migrate resolve --applied "20260220180933_add_stock_movements"
              npx prisma migrate resolve --applied "20260221142318_add_category_hierarchy"
              npx prisma migrate resolve --applied "20260221152905_allow_duplicate_category_names"
            else
              echo ">>> Migration history found, skipping baseline"
            fi

            echo ">>> Running database migrations..."
            npx prisma migrate deploy

            # Only seed if seed files changed
            if git diff HEAD~1 --name-only | grep -q "backend/src/seed"; then
              echo ">>> Seed files changed, running seeds..."
              npx tsx src/seed.ts 2>/dev/null || true
              npx tsx src/seed-admin.ts 2>/dev/null || true
            else
              echo ">>> Seed files unchanged, skipping"
            fi
            rm -rf dist
            npx tsc
            pm2 reload nunstock-backend --update-env 2>/dev/null \
              || NODE_ARGS='--env-file=/var/www/nunstock/backend/.env' \
                 pm2 start dist/index.js --name nunstock-backend \
                 --node-args='--env-file=/var/www/nunstock/backend/.env'

            # ── 11. Deploy Frontend ──────────────────
            echo ">>> Deploy Frontend (port 9090)..."
            cd /var/www/nunstock/frontend
            npm install --prefer-offline
            npm run build
            pm2 reload nunstock-frontend --update-env 2>/dev/null \
              || PORT=9090 pm2 start npm --name nunstock-frontend -- start

            pm2 save
            echo "======================================"
            echo "  Deploy complete!"
            echo "  https://nunmechanic.com"
            echo "  https://api.nunmechanic.com"
            echo "======================================"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
