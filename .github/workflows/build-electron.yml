name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Auto-increment version: 1.0.{run_number}
      - name: Set version
        working-directory: ./electron
        shell: bash
        run: |
          npm pkg set version="1.0.${{ github.run_number }}"
          echo ">>> Building version 1.0.${{ github.run_number }}"

      - name: Install dependencies
        working-directory: ./electron
        run: npm install

      # Build AND publish to GitHub Releases (electron-updater needs this)
      - name: Build and Publish
        working-directory: ./electron
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NunMechanic-Windows-v1.0.${{ github.run_number }}
          path: electron/dist/*.exe

      # Also update the "latest" tag for easy download link
      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "📥 นันการช่าง v1.0.${{ github.run_number }}"
          body: |
            ## ดาวน์โหลด นันการช่าง Desktop v1.0.${{ github.run_number }}

            ### Windows
            📥 คลิกไฟล์ `.exe` ด้านล่างเพื่อดาวน์โหลดและติดตั้ง

            > ⚠️ ครั้งแรกอาจจะเจอ Windows SmartScreen — กด "More info" → "Run anyway"
            > 🔄 ครั้งต่อไปแอปจะอัพเดตเองอัตโนมัติ ไม่ต้องดาวน์โหลดใหม่!

            🕐 อัพเดตล่าสุด: ${{ github.event.head_commit.timestamp }}
          files: |
            electron/dist/*.exe
            electron/dist/latest.yml
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
