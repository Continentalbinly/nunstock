name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Auto-increment version: 1.0.{run_number}
      - name: Set version
        working-directory: ./electron
        shell: bash
        run: |
          npm pkg set version="1.0.${{ github.run_number }}"
          echo ">>> Building version 1.0.${{ github.run_number }}"

      - name: Install dependencies
        working-directory: ./electron
        run: npm install

      # Build only — we handle the release ourselves
      - name: Build Windows .exe
        working-directory: ./electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NunMechanic-Windows-v1.0.${{ github.run_number }}
          path: electron/dist/*.exe

      # Clean up: delete ALL old releases (versioned + latest)
      - name: Delete all old releases
        shell: bash
        run: |
          echo ">>> Deleting all old releases..."
          gh release list --limit 50 --json tagName -q '.[].tagName' | while read tag; do
            echo "Deleting release: $tag"
            gh release delete "$tag" -y --cleanup-tag || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create fresh "latest" release with only the new .exe
      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "NunMechanic v1.0.${{ github.run_number }}"
          body: |
            ## Download NunMechanic Desktop v1.0.${{ github.run_number }}

            ### Windows
            Click the `.exe` file below to download and install.

            > First time: Windows SmartScreen may appear — click "More info" then "Run anyway"

            Updated: ${{ github.event.head_commit.timestamp }}
          files: |
            electron/dist/*.exe
            electron/dist/latest.yml
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
