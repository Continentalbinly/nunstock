name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./electron
        run: npm install

      - name: Build Windows .exe
        working-directory: ./electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NunMechanic-Windows
          path: electron/dist/*.exe

      # Always update the "latest" release on every push
      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "📥 นันการช่าง - ดาวน์โหลดล่าสุด"
          body: |
            ## ดาวน์โหลด นันการช่าง Desktop

            ### Windows
            📥 คลิกไฟล์ `.exe` ด้านล่างเพื่อดาวน์โหลดและติดตั้ง

            > ⚠️ ครั้งแรกอาจจะเจอ Windows SmartScreen — กด "More info" → "Run anyway"

            🕐 อัพเดตล่าสุด: ${{ github.event.head_commit.timestamp }}
          files: electron/dist/*.exe
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
